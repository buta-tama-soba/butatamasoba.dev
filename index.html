<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>butatamasoba.dev — QA Knowledge Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__left">
      <button class="header__menu-btn" id="menuToggle" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
      <div class="header__brand">
        <h1 class="header__title">butatamasoba.dev</h1>

      </div>
    </div>
    <div class="header__center">
      <div class="header__search">
        <svg class="header__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="searchInput" class="header__search-input" placeholder="Search topics...">
        <kbd class="header__search-kbd">/</kbd>
      </div>
    </div>
    <div class="header__right">
      <a class="header__x-link" href="https://x.com/butatamasoba" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <div class="header__count" id="topicCount">
        <span class="header__count-num">0</span>
        <span class="header__count-label">topics</span>
      </div>
    </div>
  </header>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar__nav">
        <div class="sidebar__section-label">Categories</div>
        <ul class="sidebar__list" id="categoryList">
          <!-- Populated by JS -->
        </ul>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__noise-label">Built with curiosity</div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="main__header">
        <h2 class="main__title" id="currentCategory">All Topics</h2>
        <div class="main__sort">
          <button class="main__sort-btn active" data-sort="date">New</button>
          <button class="main__sort-btn" data-sort="title">A-Z</button>
        </div>
      </div>
      <div class="card-grid" id="cardGrid">
        <!-- Populated by JS -->
      </div>
      <div class="main__empty" id="emptyState" style="display:none;">
        <div class="main__empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M8 11h6"/>
          </svg>
        </div>
        <p class="main__empty-text">No topics found</p>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal__backdrop" id="modalBackdrop"></div>
    <div class="modal__container">
      <button class="modal__close" id="modalClose" aria-label="閉じる">&times;</button>
      <div class="modal__image-wrap" id="modalImageWrap"></div>
      <div class="modal__content">
        <span class="modal__category" id="modalCategory"></span>
        <h2 class="modal__title" id="modalTitle"></h2>
        <div class="modal__tags" id="modalTags"></div>
        <div class="modal__body" id="modalBody"></div>
        <time class="modal__date" id="modalDate"></time>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
